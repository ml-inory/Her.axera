services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "7860:7860"
    environment:
      - API_BASE_URL=http://backend:8080
      - FRONTEND_HOST=0.0.0.0
      - FRONTEND_PORT=7860
    depends_on:
      - backend
    restart: unless-stopped
